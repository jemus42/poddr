        J. Loehr</a>                  \t  </span>\n                \t\t</div>\n                  \t\t<p>It&#8217;s
        time again for Counterclockwise, the panel show where four people discuss
        four geeky aspects of a single topic, and it&#8217;ll all get done in less
        than 42 minutes.</p>\n\n<p>This week, Jason and Dan are joined by Scott McNulty
        and David Loehr to discuss &#8220;Star Trek.&#8221;</p>\n\n<p>Our topics include:
