        will face off to answer diabolical questions about TV shows, comics, movies,
        books, games, and more. Host Dan Moren and scorekeeper/announcer Lex Friedman
        oversee the proceedings, doling out hard-earned points where appropriate.
        </p>\n\n<p>To launch the show, we handpicked a roster of some of our favorite
        Incomparable panelists to compete for your amusement. Join Scott McNulty,
        Georgia Dow, Lisa Schmeiser, Tony Sindelar, Erika Ensign, and, of course,
        Jason Snell as they identify arcane jargon, test their knowledge of classic
        books of fantasy and sci-fi, and explore the colliding worlds of mashed-up
        movies. </p>\n\n<p>(From the people who bring you The Incomparable, Game Show
        is a new podcast featuring panels, pundits, and more! Rather than being a
        single weekly game, this podcast contains several different games (with different
        hosts) rotating through from week to week. What they all have in common is
        chat, humor, and fun. To subscribe to Game Show, use this RSS feed: <a href=\"http://feeds.theincomparable.com/gameshow\">feeds.theincomparable.com/gameshow</a>.
