        \ <div class=\"episode-info\">\n              \t\t  <div class=\"episode-date\">May
        13, 2026\n                \t\t  <span class=\"episode-subtitle\">Missed Connections
        2</span>\n</div>\n              \t\t  <h5><a href=\"https://www.theincomparable.com/gameshow/282/\"><span
        class=\"ep-num\">282</span>\n                \t\t  Psychedelic Pizza</a></h5>\n
        \             \t\t  <div class=\"episode-meta\">\n                  \t  <span
        class=\"hosts\">\n                    \t  Hosts <a href='https://www.theincomparable.com/person/jason-snell/'>Jason
        Snell</a> and <a href='https://www.theincomparable.com/person/brian-hamilton/'>Brian
        Hamilton</a> with <a href='https://www.theincomparable.com/person/lex-friedman/'>Lex
        Friedman</a>, <a href='https://www.theincomparable.com/person/monty-ashley/'>Monty
        Ashley</a>, <a href='https://www.theincomparable.com/person/dan-moren/'>Dan
        Moren</a>, and <a href='https://www.theincomparable.com/person/tony-sindelar/'>Tony
        Sindelar</a>                  \t  </span>\n                \t\t</div>\n                  \t\t<p>Welcome
        back to Missed Connections, a game in which our contestants must make four
