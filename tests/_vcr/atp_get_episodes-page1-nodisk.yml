        \           People really don&rsquo;t like AI. (Sponsored by AI.)        </p>\n
        \   \n        <ul>\n<li>Pre-show: \n\n<ul>\n<li>\U0001F5E3️ New <a href=\"https://atp.fm/join\">ATP
